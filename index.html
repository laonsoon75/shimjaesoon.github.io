<!DOCTYPE html>

<head>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #faf7f2;
    color: #1a1812;
    font-family: 'Inter', sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .top-line {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 1.5px;
    background: #1a1812;
  }

  .bottom-line {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 1.5px;
    background: #1a1812;
  }

  .wrapper {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* 이름 헤더 */
  .name-block {
    padding-bottom: 2.5rem;
    border-bottom: 0.5px solid #ddd5c0;
    margin-bottom: 2.5rem;
  }

  .name-kr {
    font-family: 'Noto Serif KR', serif;
    font-weight: 200;
    font-size: 13px;
    color: #9a8e78;
    letter-spacing: 0.3em;
    margin-bottom: 0.5rem;
  }

  .name-en {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(42px, 8vw, 72px);
    font-style: italic;
    color: #1a1812;
    line-height: 1;
    margin-bottom: 0.75rem;
  }

  .name-title {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #b8a888;
  }

  /* 버튼들 */
  .links {
    display: flex;
    flex-direction: column;
    gap: 1.5px;
  }

  .link-item {
    display: flex;
    align-items: stretch;
    border: 0.5px solid #ddd5c0;
    background: #faf7f2;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: background 0.2s;
    overflow: hidden;
  }

  .link-item:hover {
    background: #f3ede3;
  }

  .link-item:hover .link-arrow {
    opacity: 1;
    transform: translateX(0);
  }

  .link-num {
    font-family: 'DM Serif Display', serif;
    font-size: 48px;
    font-style: italic;
    color: #e8dcc8;
    line-height: 1;
    padding: 1.5rem 1.75rem;
    flex-shrink: 0;
    border-right: 0.5px solid #ddd5c0;
    display: flex;
    align-items: center;
  }

  .link-body {
    padding: 1.5rem 1.75rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
  }

  .link-label-kr {
    font-family: 'Noto Serif KR', serif;
    font-weight: 200;
    font-size: 11px;
    color: #9a8e78;
    letter-spacing: 0.2em;
  }

  .link-label-en {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: #1a1812;
  }

  .link-sub {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #c8b99a;
    margin-top: 2px;
  }

  .link-arrow {
    padding: 1.5rem 1.75rem;
    display: flex;
    align-items: center;
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    font-style: italic;
    color: #9a8e78;
    opacity: 0;
    transform: translateX(-8px);
    transition: opacity 0.2s, transform 0.2s;
  }

  /* 하단 */
  .footer {
    margin-top: 2.5rem;
    padding-top: 2rem;
    border-top: 0.5px solid #ddd5c0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-loc {
    font-family: 'Noto Serif KR', serif;
    font-weight: 200;
    font-size: 11px;
    color: #b8a888;
    letter-spacing: 0.15em;
  }

  .footer-tag {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #c8b99a;
  }
</style>
</head>

    <a class="link-item" href="sim_jaesoon_cv.html">

        <span class="link-sub">15 ans d'expérience · Corée · France</span>
      </div>
      <span class="link-arrow">→</span>

  <div class="footer">
    <span class="footer-loc">Seoul · Lyon · Paris</span>
    <span class="footer-tag">Design · 2025</span>
  </div>

</div>
